# cargo-deny configuration for the recast workspace.
#
# Tight by default. Loosen with explicit entries plus a one-line `# reason:`
# comment when a new dep forces the issue.

[graph]
all-features = true

[advisories]
version = 2
ignore = []
unmaintained = "workspace"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
