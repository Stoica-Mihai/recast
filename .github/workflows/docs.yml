name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build the book
        working-directory: docs
        run: mdbook build
      - uses: actions/upload-artifact@v5
        with:
          name: book-html
          path: target/book

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # GitHub Pages requires a public repo on the free plan. The deploy
    # job no-ops on private repos so the `build` job (and therefore
    # CI) still passes; flip the repo to public (or upgrade the plan)
    # to start publishing.
    if: ${{ github.event.repository.visibility == 'public' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build the book
        working-directory: docs
        run: mdbook build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book
      - id: deployment
        uses: actions/deploy-pages@v4
