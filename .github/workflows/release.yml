name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: cargo build
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --all-features --target ${{ matrix.target }} -p recast-cli
          else
            cargo build --release --all-features --target ${{ matrix.target }} -p recast-cli
          fi
      - name: package
        shell: bash
        run: |
          name="recast-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/release/recast" staging/
          cp README.md LICENSE CHANGELOG.md staging/
          tar -czf "dist/${name}.tar.gz" -C staging .
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - uses: actions/upload-artifact@v5
        with:
          name: recast-${{ matrix.target }}
          path: dist/*

  publish-crates:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Tag pushes always publish; manual workflow_dispatch reruns
    # against an existing tag don't, so we don't try to re-publish
    # an already-shipped version.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates
      - name: cargo publish recast-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p recast-core --token "$CARGO_REGISTRY_TOKEN"
      - name: wait for index propagation
        run: sleep 90
      - name: cargo publish recast-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p recast-cli --token "$CARGO_REGISTRY_TOKEN"

  publish:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: list
        run: ls -la artifacts/
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          # Pull the lines between `## [<ver>]` and the next `## [` heading.
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "No CHANGELOG entry for $ver; falling back to autogenerated notes." >&2
            printf '## %s\n\nAutomated release for %s.\n' "$tag" "$tag" > notes.md
          fi
          echo "---- release notes ----"
          cat notes.md
          echo "---- end notes ----"
      - name: upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --notes-file notes.md
          fi
          gh release upload "$tag" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
